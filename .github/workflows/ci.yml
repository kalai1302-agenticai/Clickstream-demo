name: CI Pipeline

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build, Test & Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/test_ingestion_api.py -v --tb=short

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/clickstream-ingestion-api:${{ github.sha }} .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/clickstream-ingestion-api:${{ github.sha }} \
                     ${{ secrets.DOCKERHUB_USERNAME }}/clickstream-ingestion-api:latest

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/clickstream-ingestion-api:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/clickstream-ingestion-api:latest

      - name: CI summary
        run: |
          echo "======================================"
          echo "  CI PIPELINE - PASSED"
          echo "======================================"
          echo "  Image : ${{ secrets.DOCKERHUB_USERNAME }}/clickstream-ingestion-api"
          echo "  Tag   : ${{ github.sha }}"
          echo "  Tests : All passed"
          echo "======================================"
